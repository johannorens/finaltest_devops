name: API CI

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "lapitest/**"
      - ".github/workflows/api-ci.yml"

jobs:
  test:
    name: Tests Laravel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lapitest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_mysql, mbstring, bcmath, zip

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: lapitest/vendor
          key: composer-${{ hashFiles('lapitest/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup .env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: php artisan migrate --force

      - name: Tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: php artisan test

  build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: ./lapitest
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy uniquement quand la PR cible main (tu cliques Merge manuellement) ──
  deploy:
    name: Deploy → Render
    runs-on: ubuntu-latest
    needs: build
    if: github.base_ref == 'main'
    environment:
      name: production
      url: ${{ vars.RENDER_API_URL }}

    steps:
      - name: Trigger Render deploy hook
        run: curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Health check (attend 60s)
        run: |
          sleep 60
          curl --fail "${{ vars.RENDER_API_URL }}/health"