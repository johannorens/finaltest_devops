name: Front CI

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "frontend-react/**"
      - ".github/workflows/front-ci.yml"

jobs:
  test:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build check
        env:
          VITE_API_URL: http://localhost:8080/api
        run: npm run build

  build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/front
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend-react
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy uniquement quand la PR cible main (tu cliques Merge manuellement) ──
  deploy:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.base_ref == 'main'
    environment:
      name: production
      url: ${{ vars.VERCEL_APP_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend-react

      - name: Build via Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend-react
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend-react